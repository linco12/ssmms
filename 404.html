<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SSMMS</title>
  <script>
    // SPA redirect for GitHub Pages — preserves the URL path so React Router works
    var seg = 1; // keep 1 segment (/ssmms)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
